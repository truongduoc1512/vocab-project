# ==========================================
# Application Configuration
# ==========================================
spring.application.name=backend
server.port=${PORT:8080}

# ==========================================
# Database Configuration (Supabase PostgreSQL)
# ==========================================
# Local Development database
spring.datasource.url=jdbc:postgresql://aws-0-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.rwbgekzpxdrisgwkplzm
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# For Supabase production (uncomment and configure when ready)
# spring.datasource.url=jdbc:postgresql://<supabase-host>:5432/postgres
